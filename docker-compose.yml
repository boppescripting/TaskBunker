services:
  app:
    image: ghcr.io/boppescripting/taskbunker:latest
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      LIBSQL_URL: file:/app/data/taskbunker.db
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
    volumes:
      - taskbunker_data:/app/data

volumes:
  taskbunker_data:
